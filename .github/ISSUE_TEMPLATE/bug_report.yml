name: Bug Report
description: Something is broken or behaving incorrectly in-game.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Before opening this issue:**
        - Check that you are on the latest version of this mod.
        - Check that the bug has not already been reported.
        - Read the log. The game log is at `%USERPROFILE%\Documents\My Games\FarmingSimulator2025\log.txt`. Filter for `[FertDepot]` lines.

        Issues opened without a log snippet will be closed without response.

  - type: input
    id: mod_version
    attributes:
      label: Mod Version
      description: Found in modDesc.xml or the in-game mod manager.
      placeholder: "e.g. 1.0.0.0"
    validations:
      required: true

  - type: input
    id: game_version
    attributes:
      label: Farming Simulator 25 Version
      description: Found in the main menu bottom-right corner.
      placeholder: "e.g. 1.4.0.0"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Game Mode
      options:
        - Singleplayer
        - Multiplayer (host)
        - Multiplayer (client)
        - Dedicated Server
    validations:
      required: true

  - type: dropdown
    id: sf_installed
    attributes:
      label: Is FS25_SoilFertilizer installed?
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you see? What did you expect to see?
      placeholder: "I walked into the Depot, pressed E, but no dialog appeared. Expected the purchase dialog to open."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps that trigger the bug. If you cannot reproduce it reliably, say so.
      placeholder: |
        1. Place the Depot building
        2. Walk inside the door area
        3. Press E
        4. Nothing happens
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: Log Snippet
      description: |
        Paste all `[FertDepot]` lines from your log.txt covering the session where the bug occurred.
        If there are errors (lines containing "Error" or "attempt to"), include the full stack trace.
      render: text
      placeholder: |
        [FertDepot] Proximity: entered depot #1
        [FertDepot] _onInteractAction: open depot #1
        Error: Running LUA method ...
    validations:
      required: true

  - type: textarea
    id: other_mods
    attributes:
      label: Other Mods Loaded
      description: List any other mods active in this save. You can paste the mod list from the game's mod manager.
      placeholder: "FS25_SoilFertilizer, Courseplay, AutoDrive, ..."
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Anything Else?
      description: Screenshots, save files, or any other context that might help.
    validations:
      required: false
